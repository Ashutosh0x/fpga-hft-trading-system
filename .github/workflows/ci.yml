name: FPGA CI - Lint and Simulate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verilator-lint-and-sim:
    name: Verilator Lint and Simulate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator 5.x
        run: |
          sudo apt-get update
          sudo apt-get install -y git perl python3 make autoconf g++ flex bison ccache numactl perl-doc libfl2 libfl-dev zlib1g zlib1g-dev help2man
          git clone https://github.com/verilator/verilator.git --depth 1 --branch v5.024
          cd verilator
          autoconf
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          verilator --version

      - name: Lint all RTL modules
        run: |
          verilator --lint-only -Wall --timing \
            -Wno-UNUSEDSIGNAL -Wno-UNUSEDPARAM -Wno-UNDRIVEN \
            -Wno-WIDTHEXPAND -Wno-WIDTHTRUNC -Wno-INITIALDLY \
            -Wno-BLKANDNBLK -Wno-CASEINCOMPLETE -Wno-LATCH \
            rtl/fixed_point_pkg.sv \
            rtl/ema_calculator.sv \
            rtl/speculative_parser.sv \
            rtl/market_data_parser.sv \
            rtl/cuckoo_hash_table.sv \
            rtl/order_book.sv \
            rtl/feature_extractor.sv \
            rtl/neural_inference.sv \
            rtl/transformer_attention.sv \
            rtl/deterministic_wrapper.sv \
            rtl/avellaneda_stoikov.sv \
            rtl/market_maker.sv \
            rtl/stat_arb.sv \
            rtl/latency_arbiter.sv \
            rtl/risk_manager.sv \
            rtl/order_generator.sv \
            rtl/session_override.sv \
            rtl/trading_system_top.sv \
            rtl/smartnic_top.sv \
            rtl/sparse_neural_inference.sv \
            rtl/fp8_compute_unit.sv \
            rtl/inline_packet_filter.sv

      - name: Build basic testbench with Verilator
        run: |
          verilator --binary --timing --top-module tb_trading_system \
            -Wno-UNUSEDSIGNAL -Wno-UNUSEDPARAM -Wno-UNDRIVEN \
            -Wno-WIDTHEXPAND -Wno-WIDTHTRUNC -Wno-INITIALDLY \
            -Wno-TIMESCALEMOD -Wno-STMTDLY -Wno-BLKANDNBLK \
            -Wno-CASEINCOMPLETE -Wno-LATCH -Wno-INFINITELOOP \
            -Wno-MULTIDRIVEN \
            rtl/fixed_point_pkg.sv \
            rtl/ema_calculator.sv \
            rtl/market_data_parser.sv \
            rtl/order_book.sv \
            rtl/market_maker.sv \
            rtl/risk_manager.sv \
            rtl/order_generator.sv \
            rtl/trading_system_top.sv \
            tb/tb_trading_system.sv

      - name: Run basic simulation
        run: ./obj_dir/Vtb_trading_system || true

      - name: Build SmartNIC testbench with Verilator
        run: |
          rm -rf obj_dir
          verilator --binary --timing --top-module tb_smartnic \
            -Wno-UNUSEDSIGNAL -Wno-UNUSEDPARAM -Wno-UNDRIVEN \
            -Wno-WIDTHEXPAND -Wno-WIDTHTRUNC -Wno-INITIALDLY \
            -Wno-TIMESCALEMOD -Wno-STMTDLY -Wno-BLKANDNBLK \
            -Wno-CASEINCOMPLETE -Wno-LATCH -Wno-INFINITELOOP \
            -Wno-MULTIDRIVEN \
            rtl/fixed_point_pkg.sv \
            rtl/ema_calculator.sv \
            rtl/speculative_parser.sv \
            rtl/order_book.sv \
            rtl/feature_extractor.sv \
            rtl/neural_inference.sv \
            rtl/deterministic_wrapper.sv \
            rtl/avellaneda_stoikov.sv \
            rtl/market_maker.sv \
            rtl/risk_manager.sv \
            rtl/order_generator.sv \
            rtl/session_override.sv \
            rtl/smartnic_top.sv \
            tb/tb_smartnic.sv

      - name: Run SmartNIC simulation
        run: ./obj_dir/Vtb_smartnic || true
